name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate fixtures against schema (Draft 2020-12)
        run: |
          npx --yes --package ajv-cli --package ajv-formats \
            ajv validate -c ajv-formats \
            -s schema/oae.v0.1.schema.json \
            --spec=draft2020 \
            -d fixtures/claude_minimal.json \
            -d fixtures/codex_minimal.json \
            -d fixtures/github_action_minimal.json \
            -d examples/real_proof_pack_wrapped.json
